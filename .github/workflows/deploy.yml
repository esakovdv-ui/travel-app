name: Deploy to production

on:
  push:
    branches:
      - main
      - feature/dima-auth
      - feature/arthur
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          BITRIX_DOMAIN: ${{ secrets.BITRIX_DOMAIN }}
          WEBHOOK_TOKEN: ${{ secrets.WEBHOOK_TOKEN }}
        with:
          host: 72.56.32.183
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BITRIX_DOMAIN,WEBHOOK_TOKEN
          script: |
            set -e
            ENV_FILE=/home/travel-app/.env.local
            touch "$ENV_FILE"
            set_env_var() {
              key="$1"
              val="$2"
              if [ -z "$val" ]; then
                return 0
              fi
              if grep -q "^${key}=" "$ENV_FILE"; then
                sed -i.bak "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                printf '%s=%s\n' "$key" "$val" >> "$ENV_FILE"
              fi
            }
            BITRIX_DOMAIN_VALUE="${BITRIX_DOMAIN:-crm.mosgortur.ru}"
            WEBHOOK_TOKEN_VALUE="${WEBHOOK_TOKEN:-1981/0ly7df3o8j23eq30}"
            set_env_var BITRIX_DOMAIN "$BITRIX_DOMAIN_VALUE"
            set_env_var WEBHOOK_TOKEN "$WEBHOOK_TOKEN_VALUE"
            MAIN_EXIT=0
            /home/deploy.sh || MAIN_EXIT=$?
            if [ -f /home/travel-app/scripts/deploy-staff-landing.sh ]; then
              bash /home/travel-app/scripts/deploy-staff-landing.sh
            fi
            exit $MAIN_EXIT
