name: Repair travel-app on server

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Rebuild and restart travel-app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.56.32.183
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== stop travel-app ==="
            pm2 stop travel-app || true
            sleep 2
            echo "=== deploy ==="
            bash /home/deploy.sh
            sleep 10
            echo "=== pm2 ==="
            pm2 list
            curl -sS -o /dev/null -w "localhost:%{http_code}\n" http://127.0.0.1:3000/ || echo "localhost failed"
            grep "^TOURVISOR_AUTHKEY=" /home/travel-app/.env.local || echo "missing TOURVISOR_AUTHKEY"
