name: Repair travel-app on server

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Rebuild and restart travel-app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.56.32.183
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 25m
          script: |
            set -e
            echo "=== stop apps (free RAM) ==="
            pm2 stop travel-app || true
            pm2 stop staff-landing || true
            sleep 2
            echo "=== rebuild travel-app only ==="
            cd /home/travel-app
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm install
            export NODE_OPTIONS="--max-old-space-size=768"
            npm run build
            pm2 restart travel-app || pm2 start npm --name travel-app -- start
            pm2 save || true
            sleep 8
            echo "=== pm2 ==="
            pm2 list
            curl -sS -o /dev/null -w "localhost:%{http_code}\n" http://127.0.0.1:3000/ || echo "localhost failed"
            grep "^TOURVISOR_AUTHKEY=" /home/travel-app/.env.local || echo "missing TOURVISOR_AUTHKEY"
            node /home/travel-app/scripts/register-tourvisor-webhook.js || true
