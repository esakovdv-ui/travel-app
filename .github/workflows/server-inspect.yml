name: Server inspect (dispatch)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/server-inspect.yml'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS layout
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.56.32.183
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== /home ==="
            ls -la /home/
            echo "=== pm2 ==="
            pm2 list || true
            echo "=== pm2 describe all ==="
            pm2 jlist 2>/dev/null | head -c 20000 || true
            echo ""
            echo "=== nginx staff ==="
            grep -R "staff.motrip" /etc/nginx/ 2>/dev/null || true
            echo "=== nginx site files ==="
            for f in /etc/nginx/sites-enabled/*; do
              echo "--- $f ---"
              cat "$f"
              echo ""
            done
            echo "=== travel-app git ==="
            if [ -d /home/travel-app/.git ]; then
              cd /home/travel-app
              git status -sb
              git log -1 --oneline
            fi
            echo "=== leads storage ==="
            ls -la /home/travel-app/storage/ 2>/dev/null || echo "no /home/travel-app/storage"
            find /home/travel-app -maxdepth 4 -name 'vlasevo-leads.json' 2>/dev/null || true
            grep -E '^VLASEVO_LEADS_PATH=' /home/travel-app/.env.local 2>/dev/null || echo "VLASEVO_LEADS_PATH not set"
            grep -E '^BITRIX_SYNC_MODE=' /home/travel-app/.env.local 2>/dev/null || echo "BITRIX_SYNC_MODE not set"
            echo "=== Bitrix env (masked) ==="
            grep -E '^(BITRIX_DOMAIN|WEBHOOK_TOKEN|REBOOKING_)=' /home/travel-app/.env.local 2>/dev/null | sed 's/=.*/=***masked***/' || true
            echo "=== curl Bitrix from VPS ==="
            echo "SOURCE_IP_ANY=$(curl -s --max-time 5 ifconfig.me || curl -s --max-time 5 icanhazip.com || echo unknown)"
            echo "SOURCE_IP_V4=$(curl -4 -s --max-time 5 ifconfig.me || curl -4 -s --max-time 5 ipv4.icanhazip.com || echo unknown)"
            echo "=== outbound firewall (ufw/iptables) ==="
            ufw status 2>/dev/null || true
            iptables -L OUTPUT -n -v 2>/dev/null | head -20 || true
            WEBHOOK_TOKEN=$(grep '^WEBHOOK_TOKEN=' /home/travel-app/.env.local 2>/dev/null | cut -d= -f2-)
            BITRIX_DOMAIN=$(grep '^BITRIX_DOMAIN=' /home/travel-app/.env.local 2>/dev/null | cut -d= -f2-)
            echo "BITRIX_DOMAIN=${BITRIX_DOMAIN:-crm.mosgortur.ru}"
            echo "=== DNS lookup (getent/dig/host) ==="
            getent hosts "${BITRIX_DOMAIN:-crm.mosgortur.ru}" || true
            command -v dig >/dev/null && dig +short "${BITRIX_DOMAIN:-crm.mosgortur.ru}" || true
            command -v host >/dev/null && host "${BITRIX_DOMAIN:-crm.mosgortur.ru}" || true
            echo "=== ping crm.mosgortur.ru (4 packets) ==="
            ping -c 4 -W 5 "${BITRIX_DOMAIN:-crm.mosgortur.ru}" || true
            echo "=== traceroute (max 15 hops) ==="
            command -v traceroute >/dev/null && traceroute -m 15 -w 2 "${BITRIX_DOMAIN:-crm.mosgortur.ru}" 2>/dev/null | head -20 || true
            echo "=== ICMP traceroute to 81.23.1.210 ==="
            command -v traceroute >/dev/null 2>&1 || (apt-get update -y >/dev/null 2>&1 && apt-get install -y traceroute >/dev/null 2>&1) || true
            traceroute -n -m 30 -w 2 81.23.1.210 || true
            echo "=== TCP traceroute to 81.23.1.210:443 ==="
            traceroute -T -p 443 -n -m 30 -w 2 81.23.1.210 || true
            echo "=== MTR TCP/443 ==="
            command -v mtr >/dev/null 2>&1 || (apt-get update -y >/dev/null 2>&1 && apt-get install -y mtr-tiny >/dev/null 2>&1) || true
            command -v mtr >/dev/null 2>&1 && mtr -n -r -c 5 -T -P 443 81.23.1.210 || echo "mtr not available"
            echo "=== TCP connect 443 ==="
            timeout 8 bash -c 'cat < /dev/null > /dev/tcp/81.23.1.210/443' && echo "TCP/443 OPEN" || echo "TCP/443 BLOCKED/timeout"
            curl -m 5 -s -o /dev/null -w "HTTPS reachability HTTP:%{http_code} TIME:%{time_total}s\n" "https://${BITRIX_DOMAIN:-crm.mosgortur.ru}/" || true
            curl -m 15 -s -w "\nHTTP:%{http_code} TIME:%{time_total}s\n" \
              -X POST "https://${BITRIX_DOMAIN:-crm.mosgortur.ru}/rest/${WEBHOOK_TOKEN}/crm.contact.list.json" \
              -H 'Content-Type: application/json' \
              -d '{"filter":{"PHONE":"+79991234567"},"select":["ID"]}' || true
            echo "=== curl verbose (connect only, 10s) ==="
            curl -v --max-time 10 -o /dev/null -X POST "https://${BITRIX_DOMAIN:-crm.mosgortur.ru}/rest/${WEBHOOK_TOKEN}/crm.contact.list.json" \
              -H 'Content-Type: application/json' \
              -d '{"filter":{"PHONE":"+79991234567"},"select":["ID"]}' 2>&1 | tail -20 || true
            echo "=== localhost vlasevo-lead ==="
            curl -m 30 -s -w "\nHTTP:%{http_code} TIME:%{time_total}s\n" \
              -X POST http://127.0.0.1:3000/api/vlasevo-lead \
              -H 'Content-Type: application/json' \
              -d '{"name":"Test","phone":"+79991234567","shift":"Dream","landing":"vlasevo","website":""}' || true
            echo "=== staff-landing pm2 ==="
            pm2 describe staff-landing || true
            STAFF_CWD=$(pm2 jlist 2>/dev/null | node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8')); const a=p.find(x=>x.name==='staff-landing'); console.log(a?.pm2_env?.pm_cwd||'');")
            echo "STAFF_CWD=$STAFF_CWD"
            if [ -n "$STAFF_CWD" ] && [ -d "$STAFF_CWD" ]; then
              ls -la "$STAFF_CWD"
              if [ -f "$STAFF_CWD/package.json" ]; then head -n 12 "$STAFF_CWD/package.json"; fi
              if [ -d "$STAFF_CWD/.git" ]; then
                cd "$STAFF_CWD"
                git status -sb
                git remote -v
                git log -1 --oneline
              fi
            fi
            echo "=== find staff-landing dirs ==="
            find /home /root /var/www -maxdepth 4 -type d -name 'staff-landing' 2>/dev/null || true
            find /home /root /var/www -maxdepth 5 -name package.json 2>/dev/null | while read f; do
              if grep -q '"staff-landing"\|"staff"' "$f" 2>/dev/null; then echo "MATCH $f"; head -5 "$f"; fi
            done
